[ACC_FIRST]
SUMMARY=Erste Schritte
HINT=Setup-Anleitung aufklappen
STEP1=Wähle dein <strong>Bundesland</strong> aus der Liste und speichere die Einstellungen.
STEP2=Aktiviere den <strong>LoxBerry MQTT Broker</strong> (empfohlen) oder trage einen eigenen Broker ein.
STEP3=Speichere und <strong>starte den Daemon neu</strong> (roter Daemon-Button in LoxBerry oder Monitor-Tab).
STEP4=Der Daemon veröffentlicht sofort und danach stündlich Schulferien und Feiertage auf MQTT.
STEP5=In Loxone: MQTT Gateway &rarr; <em>JSON expandieren</em> aktivieren, Subscription auf <code>{base}/#</code>.<br>Felder in <em>Incoming Overview</em> als Virtual Input anlegen.
TOPICS_TITLE=MQTT-Topics (Basis = <code>{base}</code>, Slug = <code>{slug}</code> für Bayern):
TH_TOPIC=Topic
TH_PAYLOAD=Payload
TH_DIR=Richtung
TOPIC_DATA={base}/{slug}/data
TOPIC_AVAIL={base}/{slug}/availability
PAYLOAD_COMPACT=Kompaktes JSON
PAYLOAD_AVAIL=online / offline
DIR_PUB=Publish (Daemon → LoxBerry)
JSON_TITLE=JSON-Struktur im <code>/data</code>-Payload (verschachtelt, damit das MQTT Gateway keine <code>##</code>-Namen erzeugt):
TH_PATH=JSON-Pfad
TH_TYPE=Typ
TH_DESC=Beschreibung
FIELD_STATE=state
FIELD_STATE_DESC=Bundesland-Code (z.B. <code>RP</code>)
