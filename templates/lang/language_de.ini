FIELD_SOON_LEN=soon.len
FIELD_SOON_LEN_DESC=Dauer in Tagen (Feiertag = 1)
FIELD_SOON_SCHOOL=soon.school.*
FIELD_SOON_SCHOOL_DESC=Nächste Schulferien: name, start, end, in, len
FIELD_SOON_PUBLIC=soon.public.*
FIELD_SOON_PUBLIC_DESC=Nächster Feiertag: name, start, in
LOXONE_TITLE=Beispiel Loxone Virtual Input Namen (Topic <code>{base}/{slug}/data</code>):
LOXONE_EXAMPLE=loxberry_schulferien_{slug}_data_now_active         → Virtual Input (digital, 0/1)\nloxberry_schulferien_{slug}_data_now_left            → Virtual Input (analog)\nloxberry_schulferien_{slug}_data_now_school_active  → Virtual Input (digital, nur Ferien)\nloxberry_schulferien_{slug}_data_now_public_active  → Virtual Input (digital, nur Feiertag)\nloxberry_schulferien_{slug}_data_soon_in             → Virtual Input (analog)
LOXONE_NOTE=<strong>Loxone Anwendungsbeispiel:</strong> Schaltprogramm auf <code>now.active = 1</code> — z.B. Heizung Ferienmodus. Mit <code>now.public.active</code> nur an gesetzlichen Feiertagen reagieren.
API_NOTE=<strong>Hinweis:</strong> Schulferien von <a href="https://schulferien-api.de" target="_blank">schulferien-api.de</a>, Feiertage von <a href="https://feiertage-api.de" target="_blank">feiertage-api.de</a> — kostenlos, keine Registrierung.

[ACC_LEGAL]
