FIELD_NOW_SCHOOL=now.school.*
FIELD_NOW_SCHOOL_DESC=Nur Schulferien: active, name, start, end, left
FIELD_NOW_PUBLIC=now.public.*
FIELD_NOW_PUBLIC_DESC=Nur Feiertag: active, name, date
FIELD_SOON_NAME=soon.name
