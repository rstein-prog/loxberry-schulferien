P2=Schulferiendaten stammen von <a href="https://schulferien-api.de" target="_blank">schulferien-api.de</a>, Feiertage von <a href="https://feiertage-api.de" target="_blank">feiertage-api.de</a>. Obwohl die Daten sorgfältig gepflegt werden, übernimmt weder die API-Betreiber noch dieses Plugin eine Gewähr für Vollständigkeit, Richtigkeit oder Aktualität. Maßgeblich sind stets die offiziellen Veröffentlichungen der jeweiligen Kultusministerien bzw. Landesgesetze.
