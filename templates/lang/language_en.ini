[ACC_FIRST]
SUMMARY=Getting started
HINT=Expand setup guide
STEP1=Select your <strong>federal state</strong> and save the settings.
STEP2=Enable the <strong>LoxBerry MQTT broker</strong> (recommended) or enter your own broker.
STEP3=Save and <strong>restart the daemon</strong> (red daemon button in LoxBerry or Monitor tab).
STEP4=The daemon publishes school holidays and public holidays to MQTT immediately and then on schedule.
STEP5=In Loxone: MQTT Gateway → enable <em>Expand JSON</em>, subscribe to <code>{base}/#</code>.<br>Map fields in <em>Incoming Overview</em> as virtual inputs.
TOPICS_TITLE=MQTT topics (base = <code>{base}</code>, slug = <code>{slug}</code> e.g. Bavaria):
TH_TOPIC=Topic
TH_PAYLOAD=Payload
TH_DIR=Direction
TOPIC_DATA={base}/{slug}/data
TOPIC_AVAIL={base}/{slug}/availability
PAYLOAD_COMPACT=Compact JSON
PAYLOAD_AVAIL=online / offline
DIR_PUB=Publish (daemon → LoxBerry)
JSON_TITLE=JSON structure in <code>/data</code> payload (nested to avoid <code>##</code> names in the MQTT gateway):
TH_PATH=JSON path
TH_TYPE=Type
TH_DESC=Description
FIELD_STATE=state
FIELD_STATE_DESC=State code (e.g. <code>RP</code>)
FIELD_NOW_ACTIVE=now.active
FIELD_NOW_ACTIVE_DESC=Free day today (school break or public holiday)?
FIELD_NOW_NAME=now.name
FIELD_NOW_NAME_DESC=Current name (school and/or public holiday)
FIELD_NOW_DATES=now.start / now.end
FIELD_NOW_DATES_DESC=Current period (primarily school break)
FIELD_NOW_LEFT=now.left
FIELD_NOW_LEFT_DESC=Remaining school break days (0 on public holiday only)
FIELD_NOW_SCHOOL=now.school.*
FIELD_NOW_SCHOOL_DESC=School break only: active, name, start, end, left
FIELD_NOW_PUBLIC=now.public.*
FIELD_NOW_PUBLIC_DESC=Public holiday only: active, name, date
FIELD_SOON_NAME=soon.name
FIELD_SOON_NAME_DESC=Next event (school break or public holiday)
FIELD_SOON_DATES=soon.start / soon.end
FIELD_SOON_DATES_DESC=Next period
FIELD_SOON_IN=soon.in
FIELD_SOON_IN_DESC=Days until next event
FIELD_SOON_LEN=soon.len
FIELD_SOON_LEN_DESC=Duration in days (public holiday = 1)
FIELD_SOON_SCHOOL=soon.school.*
FIELD_SOON_SCHOOL_DESC=Next school break: name, start, end, in, len
FIELD_SOON_PUBLIC=soon.public.*
FIELD_SOON_PUBLIC_DESC=Next public holiday: name, start, in
LOXONE_TITLE=Example Loxone virtual input names (topic <code>{base}/{slug}/data</code>):
LOXONE_EXAMPLE=loxberry_schulferien_{slug}_data_now_active         → Virtual Input (digital, 0/1)\nloxberry_schulferien_{slug}_data_now_left            → Virtual Input (analog)\nloxberry_schulferien_{slug}_data_now_school_active  → Virtual Input (digital, school only)\nloxberry_schulferien_{slug}_data_now_public_active  → Virtual Input (digital, public only)\nloxberry_schulferien_{slug}_data_soon_in             → Virtual Input (analog)
LOXONE_NOTE=<strong>Loxone example:</strong> Use a program when <code>now.active = 1</code> — e.g. heating holiday mode. Use <code>now.public.active</code> to react on public holidays only.
API_NOTE=<strong>Note:</strong> School holidays from <a href="https://schulferien-api.de" target="_blank">schulferien-api.de</a>, public holidays from <a href="https://feiertage-api.de" target="_blank">feiertage-api.de</a> — free, no registration.

